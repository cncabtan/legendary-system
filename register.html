
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbosa Server - إنشاء حساب</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .register-card {
            background-color: #161b22;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 360px;
            text-align: center;
            border: 1px solid #30363d;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #58a6ff;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px dashed #f0883e;
            padding: 5px;
            border-radius: 5px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #58a6ff;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: #58a6ff;
            outline: none;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-register:hover {
            background-color: #2ea043;
        }

        .login-link {
            margin-top: 20px;
            font-size: 13px;
            color: #8b949e;
        }

        .login-link a {
            color: #58a6ff;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="logo">BARBOSA SERVER</div>
        <div class="subtitle">قم بإنشاء حسابك باستخدام مفتاح الوصول الخاص بك</div>

        <form id="registerForm">
            <div class="input-group">
                <label for="username">اختر اسم مستخدم (USERNAME)</label>
                <input type="text" id="username" placeholder="مثال: Mhmad">
            </div>

            <div class="input-group">
                <label for="password">كلمة المرور (PASSWORD)</label>
                <input type="password" id="password" placeholder="أدخل كلمة مرور قوية...">
            </div>

            <div class="input-group">
                <label for="accessKey">مفتاح الوصول (ACCESS KEY)</label>
                <input type="text" id="accessKey" placeholder="أدخل المفتاح الذي في قاعدة البيانات...">
            </div>

            <button type="button" class="btn-register" id="submitRegister">تسجيل الحساب (REGISTER)</button>
        </form>

        <div class="login-link">
            لديك حساب بالفعل؟ <a href="#" id="toLogin">تسجيل الدخول من هنا</a>
        </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBzKvXUcZz0039bFOta9a27gG8P9oP2_0A",
        authDomain: "barbosa-server.firebaseapp.com",
        projectId: "barbosa-server",
        storageBucket: "barbosa-server.appspot.com",
        messagingSenderId: "369957518951",
        appId: "1:369957518951:web:f15dc861efec75210e39bf",
        measurementId: "G-Y67YMV9V28"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      function navigateTo(targetFile) {
          let currentPath = window.location.pathname;
          let newPath = currentPath.substring(0, currentPath.lastIndexOf('/')) + '/' + targetFile;
          window.location.href = window.location.origin ? window.location.origin + newPath : targetFile;
      }

      document.getElementById('toLogin').addEventListener('click', (e) => {
          e.preventDefault();
          navigateTo("login.html");
      });

      document.getElementById('submitRegister').addEventListener('click', async () => {
          const username = document.getElementById('username').value.trim();
          const password = document.getElementById('password').value;
          const accessKey = document.getElementById('accessKey').value.trim();

          if(!username || !password || !accessKey) {
              alert('الرجاء ملء جميع الحقول المطلوبة!');
              return;
          }

          try {
              const keyRef = doc(db, "keys", accessKey);
              const keySnap = await getDoc(keyRef);

              if(!keySnap.exists()) {
                  alert('مفتاح الوصول هذا غير صحيح أو غير موجود في السيرفر!');
                  return;
              }

              const keyData = keySnap.data();
              if(keyData.used === true) {
                  alert('عذراً، هذا المفتاح تم استخدامه مسبقاً لإنشاء حساب آخر!');
                  return;
              }

              const userRef = doc(db, "users", username);
              const userSnap = await getDoc(userRef);

              if(userSnap.exists()) {
                  alert('اسم المستخدم هذا محجوز بالفعل! اختر اسماً آخر.');
                  return;
              }

              await setDoc(userRef, {
                  username: username,
                  password: password,
                  createdAt: new Date().toISOString()
              });

              await setDoc(keyRef, { used: true }, { merge: true });

              alert('تهانينا! تم إنشاء وتفعيل حسابك بنجاح.');
              navigateTo("login.html");

          } catch (error) {
              console.error("Registration Error:", error);
              alert('حدث خطأ غير متوقع أثناء الاتصال بقاعدة البيانات.');
          }
      });
    </script>
</body>
</html>
