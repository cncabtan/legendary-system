<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbosa Server - لوحة التحكم الرئيسية</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: #161b22;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .navbar .brand {
            font-size: 22px;
            font-weight: bold;
            color: #58a6ff;
            letter-spacing: 1px;
        }

        .navbar .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar .username-tag {
            background-color: #21262d;
            padding: 5px 12px;
            border-radius: 15px;
            border: 1px solid #30363d;
            font-size: 14px;
            color: #f0883e;
        }

        .btn-logout {
            background-color: #da3637;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-logout:hover {
            background-color: #f85149;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard-card {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid #30363d;
        }

        .dashboard-card h1 {
            color: #58a6ff;
            margin-top: 0;
            font-size: 28px;
        }

        .dashboard-card p {
            color: #8b949e;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .server-status {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
        }

        .status-item {
            text-align: center;
        }

        .status-label {
            font-size: 12px;
            color: #8b949e;
            display: block;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 16px;
            font-weight: bold;
            color: #56d364;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand">BARBOSA SERVER</div>
        <div class="user-info">
            <span class="username-tag" id="userDisplay">جاري التحقق...</span>
            <button class="btn-logout" id="logoutBtn">تسجيل الخروج</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="dashboard-card">
            <h1>تم الاتصال بنجاح! 🚀</h1>
            <p>أهلاً بك في لوحة تحكم سيرفر باربوسا. تم التحقق من حسابك عبر السيرفر الرئيسي وقاعدة البيانات تعمل الآن بكفاءة مستقرة.</p>
            
            <div class="server-status">
                <div class="status-item">
                    <span class="status-label">حالة السيرفر</span>
                    <span class="status-value">متصل حالياً</span>
                </div>
                <div class="status-item">
                    <span class="status-label">قاعدة البيانات</span>
                    <span class="status-value" style="color: #58a6ff;">Firestore</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // دالة ذكية للانتقال الآمن داخل مجلدات Acode المحلي
        function navigateTo(targetFile) {
            let currentPath = window.location.pathname;
            let newPath = currentPath.substring(0, currentPath.lastIndexOf('/')) + '/' + targetFile;
            window.location.href = window.location.origin ? window.location.origin + newPath : targetFile;
        }

        // التحقق من وجود الجلسة عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            const loggedInUser = localStorage.getItem('currentUser');
            
            if (loggedInUser) {
                document.getElementById('userDisplay').innerText = loggedInUser;
            } else {
                navigateTo("login.html");
            }
        });

        // حدث تسجيل الخروج
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            alert("تم تسجيل خروجك بأمان.");
            navigateTo("login.html");
        });
    </script>
</body>
</html>
