<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول محمد برفسور</title>
    
    <style>
        /* تأثير الظهور السلس والتصميم الأساسي */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تصميم صندوق تسجيل الدخول */
        .login-box {
            background-color: #2b2b2b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.8);
            text-align: center;
            width: 300px;
            border: 2px solid #ffcc00;
        }

        .login-box h2 {
            margin-bottom: 25px;
            color: #ffcc00;
        }

        /* تصميم الحقول */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #555;
            border-radius: 8px;
            background-color: #1a1a1a;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #ffcc00;
        }

        /* تصميم قسم كلمة المرور مع زر العين */
        .pass-container {
            position: relative;
            width: 100%;
        }

        .toggle-btn {
            position: absolute;
            left: 10px;
            top: 25px;
            cursor: pointer;
            font-size: 18px;
            user-select: none;
        }

        /* تصميم زر الدخول */
        .login-btn {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 12px;
            margin-top: 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: 0.3s;
        }

        .login-btn:hover {
            background-color: #e6b800;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>النظام الأسطوري</h2>
        
        <input type="text" id="username" placeholder="اسم المستخدم أو الـ ID">
        
        <div class="pass-container">
            <input type="password" id="passInput" placeholder="كلمة المرور">
            <span class="toggle-btn" onclick="togglePassword()">👁️</span>
        </div>

        <button class="login-btn" onclick="checkFields()">دخول إلى اللعبة</button>
    </div>

    <script>
        // دالة إظهار وإخفاء كلمة المرور
        function togglePassword() {
            var input = document.getElementById("passInput");
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }

        // دالة التحقق من الحقول الفارغة
        function checkFields() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("passInput").value;
            
            if(user === "" || pass === "") {
                alert("⚠️ الرجاء تعبئة جميع الحقول أولاً!");
            } else {
                alert("✅ تم تسجيل الدخول بنجاح يا بطل! (جاري تحويلك...)");
                // يمكنك لاحقاً إضافة كود هنا للانتقال لصفحة أخرى
            }
        }
    </script>

</body>
</html>
